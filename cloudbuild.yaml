steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-docker-image'
    args: [ 'build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}', '.' ]
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-docker-image'
    args: [ 'push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}' ]
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--allow-unauthenticated'
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}'
substitutions:
  _REGION: asia-northeast1
  _REPOSITORY: remap-artifacts
  _IMAGE: remap-build-server
  _SERVICE: remap-build-server
options:
  machineType: 'E2_HIGHCPU_8'
